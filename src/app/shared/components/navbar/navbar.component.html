<header
  class="fixed top-0 left-0 right-0 z-50 frosted-glass shadow-[0px_4px_20px_rgba(139,114,102,0.08)]"
>
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-6 py-4">
    <div class="flex items-center gap-6">
      <a routerLink="/home" class="flex items-center gap-2">
        <span
          class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-primary-container text-lg font-black text-on-primary"
          >E</span
        >
        <span class="text-xl font-black tracking-tight text-primary-container font-display"
          >E&#8209;Mart</span
        >
      </a>
      <nav class="hidden gap-5 text-sm font-medium md:flex">
        <a routerLink="/home" class="text-on-surface-variant hover:text-primary-container transition-colors px-3 py-1 rounded-lg hover:bg-primary-fixed/20"
          >Home</a
        >
        <a routerLink="/products" class="text-on-surface-variant hover:text-primary-container transition-colors px-3 py-1 rounded-lg hover:bg-primary-fixed/20"
          >Products</a
        >
        <a routerLink="/cart" class="text-on-surface-variant hover:text-primary-container transition-colors px-3 py-1 rounded-lg hover:bg-primary-fixed/20"
          >Cart</a
        >
        <a routerLink="/profile" class="text-on-surface-variant hover:text-primary-container transition-colors px-3 py-1 rounded-lg hover:bg-primary-fixed/20"
          >Profile</a
        >
        @if (showAdmin$ | async) {
          <a routerLink="/admin" class="text-primary-container font-bold px-3 py-1"
            >Admin</a
          >
        }
      </nav>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <a
        routerLink="/cart"
        class="relative rounded-full p-2 text-on-surface-variant hover:bg-primary-fixed/20 hover:text-primary-container transition-colors"
      >
        <span class="material-symbols-outlined text-xl">shopping_cart</span>
        @if ((cartCount$ | async); as count) {
          @if (count > 0) {
            <span
              class="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-primary-container px-1 text-[10px] font-bold text-on-primary"
              >{{ count }}</span
            >
          }
        }
      </a>
      @if (isAuth$ | async) {
        @if (user$ | async; as user) {
          <span class="hidden text-on-surface-variant font-medium sm:inline"
            >{{ user.firstName }}</span
          >
          <button
            type="button"
            (click)="logout()"
            class="rounded-full bg-surface-container-high px-4 py-2 font-semibold text-on-surface-variant hover:bg-surface-container hover:text-primary-container transition-colors"
          >
            Log out
          </button>
        }
      } @else {
        <a
          routerLink="/auth/login"
          class="btn-primary px-5 py-2.5 text-sm"
          >Sign in</a
        >
      }
    </div>
  </div>
</header>
