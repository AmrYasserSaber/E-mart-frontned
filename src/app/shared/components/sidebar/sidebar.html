<aside
  class="flex h-full min-w-[220px] flex-col rounded-r-[2rem] bg-orange-50 py-8 pl-4 pr-0 shadow-[12px_0px_40px_rgba(139,114,102,0.04)]"
  [class.w-16]="collapsed()"
  [class.min-w-0]="collapsed()"
>
  <div class="px-4 mb-8">
    <div class="text-xl font-bold text-primary-container font-display tracking-tight">Admin Portal</div>
    <p class="text-xs text-outline font-medium">Seller Central</p>
  </div>
  <nav class="flex-1 space-y-1">
    @for (item of items(); track item.path) {
      <a
        [routerLink]="item.path"
        [attr.aria-label]="item.label"
        routerLinkActive="bg-orange-100 text-primary-container font-semibold border-r-4 border-primary-container rounded-l-full"
        class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-on-surface-variant hover:text-primary-container hover:translate-x-1 transition-all duration-300"
      >
        @if (item.icon) {
          <span class="material-symbols-outlined text-xl">{{ item.icon }}</span>
        }
        @if (!collapsed()) {
          <span>{{ item.label }}</span>
        } @else {
          <span class="sr-only">{{ item.label }}</span>
        }
      </a>
    }
  </nav>
</aside>
