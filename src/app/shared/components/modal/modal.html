@if (open()) {
  <div
    class="bg-scrim fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm"
    (click)="onBackdrop()"
    role="presentation"
  >
    <div
      class="max-h-[90vh] w-full max-w-lg overflow-hidden rounded-2xl border border-outline-variant/40 bg-surface-container-lowest shadow-tinted"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'modal-title'"
    >
      <div class="flex items-center justify-between border-b border-outline-variant/40 px-4 py-3">
        <h2 id="modal-title" class="text-lg font-semibold text-on-surface">
          {{ title() }}
        </h2>
        <button
          type="button"
          (click)="onClose()"
          class="rounded-lg p-1 text-2xl leading-none text-outline transition hover:bg-surface-container-high hover:text-on-surface"
          aria-label="Close"
        >
          &times;
        </button>
      </div>
      <div class="overflow-y-auto p-4 text-on-surface-variant">
        <ng-content />
      </div>
    </div>
  </div>
}
