@if (open()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-on-surface/40 p-4 backdrop-blur-sm"
    (click)="onBackdrop()"
    role="presentation"
  >
    <div
      class="neomorphic-card max-h-[90vh] w-full max-w-lg overflow-hidden rounded-xl bg-surface-container-lowest"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'modal-title'"
    >
      <div class="flex items-center justify-between border-b border-outline-variant/20 px-5 py-4">
        <h2 id="modal-title" class="text-lg font-bold text-on-surface font-display">
          {{ title() }}
        </h2>
        <button
          type="button"
          (click)="onClose()"
          class="rounded-full p-1.5 text-2xl leading-none text-outline hover:bg-surface-container-high hover:text-on-surface transition-colors"
          aria-label="Close"
        >
          &times;
        </button>
      </div>
      <div class="overflow-y-auto p-5 text-on-surface-variant">
        <ng-content />
      </div>
    </div>
  </div>
}
