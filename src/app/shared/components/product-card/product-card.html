<article
  class="group flex flex-col overflow-hidden rounded-xl border border-slate-800 bg-slate-900/50 shadow-lg transition hover:border-emerald-500/40"
>
  <div
    class="aspect-[4/3] overflow-hidden bg-slate-800"
  >
    @if (product().images && product().images.length > 0) {
      <img
        [src]="product().images[0]"
        [alt]="product().title"
        class="h-full w-full object-cover transition group-hover:scale-105"
        loading="lazy"
      />
    } @else {
      <div
        class="flex h-full items-center justify-center text-4xl text-slate-600"
      >
        📦
      </div>
    }
  </div>
  <div class="flex flex-1 flex-col gap-2 p-4">
    <h3 class="font-semibold text-slate-100 line-clamp-2">{{ product().title }}</h3>
    @if (product().ratingAvg != null) {
      <app-star-rating [value]="product().ratingAvg!" [readonly]="true" />
    }
    <p class="text-lg font-bold text-emerald-400">
      {{ product().price | currencyFormat }}
    </p>
    <button
      type="button"
      (click)="onAdd()"
      class="mt-auto w-full rounded-lg bg-emerald-600 py-2 text-sm font-semibold text-slate-950 hover:bg-emerald-500"
    >
      Add to cart
    </button>
  </div>
</article>
