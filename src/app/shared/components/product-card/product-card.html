<article
  class="group card flex h-full flex-col bg-surface-container-low transition duration-200 hover:-translate-y-0.5"
>
  <div
    class="aspect-4/3 overflow-hidden bg-surface-container-high"
  >
    @if (product().images?.length || product().imageUrl) {
      <img
        [src]="product().images?.[0] || product().imageUrl"
        [alt]="product().title || product().name || 'Product image'"
        class="h-full w-full object-cover transition duration-300 group-hover:scale-105"
        loading="lazy"
      />
    } @else {
      <div
        class="flex h-full items-center justify-center text-4xl text-outline"
      >
        📦
      </div>
    }
  </div>
  <div class="flex flex-1 flex-col gap-2 p-4 md:p-5">
    <h3 class="line-clamp-2 font-display text-lg font-bold text-on-surface">
      {{ product().title || product().name || 'Untitled product' }}
    </h3>
    @if (product().ratingAvg != null || product().rating != null) {
      <app-star-rating [value]="product().ratingAvg || product().rating || 0" [readonly]="true" />
    }
    <p class="text-xl font-extrabold text-primary">
      {{ product().price | currencyFormat }}
    </p>
    <button
      type="button"
      (click)="onAdd()"
      class="btn-primary mt-auto w-full py-3 text-sm font-bold"
    >
      Add to cart
    </button>
  </div>
</article>
