<div
  class="flex items-center gap-0.5"
  role="group"
  [attr.aria-label]="'Rating ' + value() + ' of ' + max()"
>
  @for (i of stars(); track i) {
    <button
      type="button"
      [disabled]="readonly()"
      (click)="set(i)"
      class="text-lg leading-none transition"
      [class.text-primary-container]="isFilled(i)"
      [class.text-outline-variant]="!isFilled(i)"
      [class.cursor-default]="readonly()"
      [class.hover:text-primary]="!readonly()"
      [attr.aria-label]="starButtonLabel(i)"
    >
      ★
    </button>
  }
</div>
