<div
  class="pointer-events-none fixed bottom-4 right-4 z-[100] flex max-w-sm flex-col gap-2"
  aria-live="polite"
>
  @for (t of toastService.toasts(); track t.id) {
    <div
      class="pointer-events-auto flex items-start justify-between gap-3 rounded-lg border px-4 py-3 text-sm shadow-lg"
      [class.border-emerald-600/50]="t.kind === 'success'"
      [class.bg-emerald-950/90]="t.kind === 'success'"
      [class.text-emerald-100]="t.kind === 'success'"
      [class.border-red-600/50]="t.kind === 'error'"
      [class.bg-red-950/90]="t.kind === 'error'"
      [class.text-red-100]="t.kind === 'error'"
      [class.border-slate-600]="t.kind === 'info'"
      [class.bg-slate-900/95]="t.kind === 'info'"
      [class.text-slate-100]="t.kind === 'info'"
    >
      <span>{{ t.message }}</span>
      <button
        type="button"
        class="shrink-0 opacity-70 hover:opacity-100"
        (click)="dismiss(t.id)"
        aria-label="Dismiss"
      >
        &times;
      </button>
    </div>
  }
</div>
