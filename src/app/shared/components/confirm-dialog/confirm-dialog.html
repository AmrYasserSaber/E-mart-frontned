<app-modal
  [open]="open()"
  [title]="title()"
  [closeOnBackdrop]="false"
  (closed)="onModalClose()"
>
  <p class="text-sm text-on-surface-variant">{{ message() }}</p>
  <div class="mt-6 flex justify-end gap-2">
    <button
      type="button"
      (click)="onCancel()"
      class="btn-secondary px-4 py-2 text-sm font-medium"
    >
      {{ cancelLabel() }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="rounded-lg px-4 py-2 text-sm font-semibold text-on-primary transition hover:opacity-90"
      [class.btn-primary]="!dangerous()"
      [class.bg-error]="dangerous()"
    >
      {{ confirmLabel() }}
    </button>
  </div>
</app-modal>
