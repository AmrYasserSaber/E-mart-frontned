<app-modal
  [open]="open()"
  [title]="title()"
  [closeOnBackdrop]="false"
  (closed)="onModalClose()"
>
  <p class="text-sm text-slate-400">{{ message() }}</p>
  <div class="mt-6 flex justify-end gap-2">
    <button
      type="button"
      (click)="onCancel()"
      class="rounded-lg border border-slate-600 px-4 py-2 text-sm font-medium text-slate-300 hover:bg-slate-800"
    >
      {{ cancelLabel() }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="rounded-lg px-4 py-2 text-sm font-semibold text-slate-950"
      [class.bg-emerald-600]="!dangerous()"
      [class.hover:bg-emerald-500]="!dangerous()"
      [class.bg-red-600]="dangerous()"
      [class.hover:bg-red-500]="dangerous()"
    >
      {{ confirmLabel() }}
    </button>
  </div>
</app-modal>
