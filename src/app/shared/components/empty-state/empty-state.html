<div
  class="flex flex-col items-center justify-center rounded-xl border border-dashed border-slate-700 bg-slate-900/40 px-6 py-14 text-center"
>
  <span class="text-4xl opacity-60" aria-hidden="true">📭</span>
  <h3 class="mt-4 text-lg font-semibold text-slate-100">{{ title() }}</h3>
  @if (message()) {
    <p class="mt-2 max-w-md text-sm text-slate-400">{{ message() }}</p>
  }
  @if (actionLabel()) {
    <button
      type="button"
      (click)="onAction()"
      class="mt-6 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-emerald-500"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
