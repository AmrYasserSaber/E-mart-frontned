<div
  class="neomorphic-card flex flex-col items-center justify-center rounded-xl bg-surface-container-lowest px-6 py-14 text-center"
>
  <span class="text-4xl opacity-60" aria-hidden="true">📭</span>
  <h3 class="mt-4 text-lg font-bold text-on-surface font-display">{{ title() }}</h3>
  @if (message()) {
    <p class="mt-2 max-w-md text-sm text-on-surface-variant">{{ message() }}</p>
  }
  @if (actionLabel()) {
    <button
      type="button"
      (click)="onAction()"
      class="btn-primary mt-6 px-5 py-2.5 text-sm"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
