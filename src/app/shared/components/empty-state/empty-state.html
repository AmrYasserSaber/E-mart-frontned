<div
  class="card flex flex-col items-center justify-center bg-surface-container-low px-6 py-12 text-center"
>
  <span class="text-4xl opacity-70" aria-hidden="true">📭</span>
  <h3 class="mt-4 font-display text-xl font-bold text-on-surface">{{ title() }}</h3>
  @if (message()) {
    <p class="mt-2 max-w-md text-sm text-secondary">{{ message() }}</p>
  }
  @if (actionLabel()) {
    <button
      type="button"
      (click)="onAction()"
      class="btn-primary mt-6 px-6 py-2.5 text-sm"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
