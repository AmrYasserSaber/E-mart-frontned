<nav
  class="flex flex-wrap items-center justify-center gap-2"
  aria-label="Pagination"
>
  <button
    type="button"
    class="rounded-full border border-outline-variant/30 px-4 py-1.5 text-sm font-medium text-on-surface-variant hover:bg-surface-container-high disabled:opacity-40 transition-colors"
    [disabled]="page() <= 1"
    (click)="go(page() - 1)"
  >
    Prev
  </button>
  @for (p of pages(); track p) {
    <button
      type="button"
      class="min-w-9 rounded-full border px-2 py-1.5 text-sm font-medium transition-colors"
      [class.border-primary-container]="p === page()"
      [class.bg-primary-container]="p === page()"
      [class.text-on-primary]="p === page()"
      [class.border-outline-variant/30]="p !== page()"
      [class.text-on-surface-variant]="p !== page()"
      [class.hover:bg-surface-container-high]="p !== page()"
      (click)="go(p)"
    >
      {{ p }}
    </button>
  }
  <button
    type="button"
    class="rounded-full border border-outline-variant/30 px-4 py-1.5 text-sm font-medium text-on-surface-variant hover:bg-surface-container-high disabled:opacity-40 transition-colors"
    [disabled]="page() >= totalPages()"
    (click)="go(page() + 1)"
  >
    Next
  </button>
</nav>
