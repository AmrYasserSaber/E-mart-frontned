<nav
  class="flex flex-wrap items-center justify-center gap-2"
  aria-label="Pagination"
>
  <button
    type="button"
    class="rounded-full bg-surface-container-high px-4 py-2 text-sm font-semibold text-on-surface transition hover:bg-surface-container disabled:opacity-40"
    [disabled]="page() <= 1"
    (click)="go(page() - 1)"
  >
    Prev
  </button>
  @for (p of pages(); track p) {
    <button
      type="button"
      class="min-w-10 rounded-full px-3 py-2 text-sm font-semibold transition"
      [class.bg-primary-container]="p === page()"
      [class.text-on-primary]="p === page()"
      [class.shadow-tinted]="p === page()"
      [class.bg-surface-container-high]="p !== page()"
      [class.text-on-surface]="p !== page()"
      [class.hover:bg-surface-container]="p !== page()"
      (click)="go(p)"
    >
      {{ p }}
    </button>
  }
  <button
    type="button"
    class="rounded-full bg-surface-container-high px-4 py-2 text-sm font-semibold text-on-surface transition hover:bg-surface-container disabled:opacity-40"
    [disabled]="page() >= totalPages()"
    (click)="go(page() + 1)"
  >
    Next
  </button>
</nav>
