<nav
  class="flex flex-wrap items-center justify-center gap-2"
  aria-label="Pagination"
>
  <button
    type="button"
    class="inner-shadow flex h-10 w-10 items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant transition hover:bg-surface-container-lowest disabled:opacity-40"
    [disabled]="page() <= 1"
    (click)="go(page() - 1)"
    aria-label="Previous page"
  >
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  @for (p of pages(); track p) {
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full text-sm font-semibold transition"
      [class.bg-primary-container]="p === page()"
      [class.text-on-primary]="p === page()"
      [class.shadow-md]="p === page()"
      [class.tactile-card]="p !== page()"
      [class.bg-surface-container-lowest]="p !== page()"
      [class.text-on-surface-variant]="p !== page()"
      [class.hover:text-primary]="p !== page()"
      (click)="go(p)"
    >
      {{ p }}
    </button>
  }
  <button
    type="button"
    class="inner-shadow flex h-10 w-10 items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant transition hover:bg-surface-container-lowest disabled:opacity-40"
    [disabled]="page() >= totalPages()"
    (click)="go(page() + 1)"
    aria-label="Next page"
  >
    <span class="material-symbols-outlined">chevron_right</span>
  </button>
</nav>
