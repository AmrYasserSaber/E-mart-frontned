<!-- Modern Checkout Layout -->
<main class="pt-12 pb-16 px-6 max-w-7xl mx-auto">
  <!-- Progress Tracker -->
  @if (currentStep() !== STEP.CONFIRMATION) {
    <app-step-indicator />
  }

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start h-full">
    <!-- Active Step Content Area -->
    <div class="lg:col-span-8 space-y-8 min-h-[600px] relative">
      @switch (currentStep()) {
        @case (STEP.ADDRESS) {
          <app-address-step />
        }
        @case (STEP.PAYMENT) {
          <app-payment-step />
        }
        @case (STEP.CONFIRMATION) {
          <app-confirmation-step />
        }
      }
    </div>

    <!-- Persistent Sidebar: Order Summary -->
    <aside class="lg:col-span-4 sticky top-24" [class.hidden]="currentStep() === STEP.CONFIRMATION">
      <app-order-summary />
      
      <!-- Security Badges Footer -->
      <div class="mt-8 flex items-center justify-center gap-4 text-outline opacity-60">
        <div class="flex flex-col items-center">
          <span class="material-symbols-outlined text-3xl">verified_user</span>
          <p class="text-[8px] uppercase font-bold tracking-widest mt-1">Certified</p>
        </div>
        <div class="flex flex-col items-center">
          <span class="material-symbols-outlined text-3xl">local_shipping</span>
          <p class="text-[8px] uppercase font-bold tracking-widest mt-1">Insured</p>
        </div>
        <div class="flex flex-col items-center">
          <span class="material-symbols-outlined text-3xl">autorenew</span>
          <p class="text-[8px] uppercase font-bold tracking-widest mt-1">30-Day</p>
        </div>
      </div>
    </aside>
  </div>
</main>
