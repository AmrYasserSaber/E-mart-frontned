<section class="space-y-4 animate-in fade-in slide-in-from-bottom duration-500">
  <h3 class="text-lg font-display font-bold text-on-surface-variant px-2">Select Payment Method</h3>
  
  <div class="grid grid-cols-1 gap-4">
    <button
      type="button"
      (click)="selectMethod('KASHIER')"
      [class.border-primary-container]="selectedMethod() === 'KASHIER'"
      [class.neomorphic-outset]="selectedMethod() === 'KASHIER'"
      [class.bg-surface-container-lowest]="selectedMethod() === 'KASHIER'"
      [class.bg-surface-container-low]="selectedMethod() !== 'KASHIER'"
      class="group relative p-6 rounded-lg border-2 border-transparent transition-all text-left"
    >
      <div class="flex items-center gap-6">
        <span
          class="material-symbols-outlined text-4xl"
          [class.text-primary-container]="selectedMethod() === 'KASHIER'"
          [class.text-outline]="selectedMethod() !== 'KASHIER'"
        >credit_card</span>
        <div>
          <p class="font-bold text-on-surface">Pay with Kashier</p>
          <p class="text-xs text-on-surface-variant">Secure card payment via Kashier checkout.</p>
        </div>
      </div>
      @if (selectedMethod() === 'KASHIER') {
        <div class="absolute top-1/2 -translate-y-1/2 right-6 h-6 w-6 rounded-full bg-primary-container flex items-center justify-center">
          <div class="h-2 w-2 rounded-full bg-white"></div>
        </div>
      }
    </button>

    <button
      type="button"
      (click)="selectMethod('CASH_ON_DELIVERY')"
      [class.border-primary-container]="selectedMethod() === 'CASH_ON_DELIVERY'"
      [class.neomorphic-outset]="selectedMethod() === 'CASH_ON_DELIVERY'"
      [class.bg-surface-container-lowest]="selectedMethod() === 'CASH_ON_DELIVERY'"
      [class.bg-surface-container-low]="selectedMethod() !== 'CASH_ON_DELIVERY'"
      class="group relative p-6 rounded-lg border-2 border-transparent transition-all text-left"
    >
      <div class="flex items-center gap-6">
        <span
          class="material-symbols-outlined text-4xl"
          [class.text-primary-container]="selectedMethod() === 'CASH_ON_DELIVERY'"
          [class.text-outline]="selectedMethod() !== 'CASH_ON_DELIVERY'"
        >payments</span>
        <div>
          <p class="font-bold text-on-surface">Cash on Delivery</p>
          <p class="text-xs text-on-surface-variant">Pay in cash upon receiving your order.</p>
        </div>
      </div>
      @if (selectedMethod() === 'CASH_ON_DELIVERY') {
        <div class="absolute top-1/2 -translate-y-1/2 right-6 h-6 w-6 rounded-full bg-primary-container flex items-center justify-center">
          <div class="h-2 w-2 rounded-full bg-white"></div>
        </div>
      }
    </button>
  </div>

  <div class="pt-8 flex flex-col md:flex-row gap-4">
    <button 
      (click)="back()"
      class="flex-1 bg-surface-container-low text-on-surface-variant font-bold py-4 rounded-xl shadow-sm hover:bg-surface-container transition-all flex items-center justify-center gap-2"
    >
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Address
    </button>
    <button 
      (click)="completePurchase()"
      [disabled]="loading()"
      class="flex-[2] bg-primary-container text-white font-headline font-bold py-4 rounded-xl shadow-lg hover:bg-primary transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (loading()) {
        <span class="material-symbols-outlined animate-spin">sync</span>
        Processing...
      } @else {
        Complete Purchase
        <span class="material-symbols-outlined">check_circle</span>
      }
    </button>
  </div>
</section>
