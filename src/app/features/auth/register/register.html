<div class="mx-auto max-w-md space-y-6 px-4 py-12">
  <h1 class="text-2xl font-bold text-slate-100">Create account</h1>
  <p class="text-slate-400">
    Already registered?
    <a routerLink="/auth/login" class="font-medium text-emerald-400 hover:underline"
      >Sign in</a
    >
  </p>
  <form (ngSubmit)="submit()" class="space-y-4">
    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="block text-sm text-slate-400" for="register-firstName"
          >First name</label
        >
        <input
          id="register-firstName"
          [(ngModel)]="firstName"
          name="firstName"
          required
          autocomplete="given-name"
          class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100"
        />
      </div>
      <div>
        <label class="block text-sm text-slate-400" for="register-lastName"
          >Last name</label
        >
        <input
          id="register-lastName"
          [(ngModel)]="lastName"
          name="lastName"
          required
          autocomplete="family-name"
          class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100"
        />
      </div>
    </div>
    <div>
      <label class="block text-sm text-slate-400" for="register-email"
        >Email</label
      >
      <input
        id="register-email"
        type="email"
        [(ngModel)]="email"
        name="email"
        required
        autocomplete="email"
        class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100"
      />
    </div>
    <div>
      <label class="block text-sm text-slate-400" for="register-password"
        >Password (min 8)</label
      >
      <input
        id="register-password"
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        minlength="8"
        autocomplete="new-password"
        class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100"
      />
    </div>
    @if (error$ | async; as err) {
      @if (err) {
        <p class="text-sm text-red-400">{{ err }}</p>
      }
    }
    <button
      type="submit"
      [disabled]="loading$ | async"
      class="w-full rounded-lg bg-emerald-600 py-2 font-semibold text-slate-950 hover:bg-emerald-500 disabled:opacity-50"
    >
      Register
    </button>
  </form>
</div>
