<div class="mx-auto max-w-md space-y-6 px-4 py-12">
  <h1 class="text-2xl font-bold text-on-surface">Sign in</h1>
  <p class="text-on-surface-variant">
    New here?
    <a routerLink="/auth/register" class="font-medium text-primary hover:underline"
      >Create an account</a
    >
  </p>
  <form (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-sm text-on-surface-variant">Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
        class="input-soft mt-1"
      />
    </div>
    <div>
      <label class="block text-sm text-on-surface-variant">Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        autocomplete="current-password"
        class="input-soft mt-1"
      />
    </div>
    @if (error$ | async; as err) {
      @if (err) {
        <p class="text-sm text-error">{{ err }}</p>
      }
    }
    <button
      type="submit"
      class="btn-primary w-full rounded-lg py-2 font-semibold disabled:opacity-50"
      [disabled]="loading$ | async"
    >
      @if (loading$ | async) {
        Signing in…
      } @else {
        Sign in
      }
    </button>
  </form>
</div>
