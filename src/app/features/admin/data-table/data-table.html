<div class="overflow-x-auto rounded-xl border border-outline-variant/60 bg-surface-container-lowest">
  <table class="w-full min-w-[640px] text-left text-sm text-on-surface-variant">
    <thead class="border-b border-outline-variant/60 bg-surface-container-low text-xs uppercase tracking-wide text-outline">
      <tr>
        @for (col of columns(); track col.key) {
          <th class="px-4 py-3 font-medium">
            @if (col.sortable) {
              <button
                type="button"
                class="inline-flex items-center gap-1 hover:text-primary"
                (click)="onHeaderClick(col)"
              >
                {{ col.label }}
                @if (sortKey() === col.key) {
                  <span>{{ sortDir() === 'asc' ? '↑' : '↓' }}</span>
                }
              </button>
            } @else {
              {{ col.label }}
            }
          </th>
        }
      </tr>
    </thead>
    <tbody class="divide-y divide-outline-variant/60">
      @for (row of rows(); track $index) {
        <tr
          appRowPress
          (rowPress)="onRow(row)"
          class="cursor-pointer transition hover:bg-surface-container-low"
        >
          @for (col of columns(); track col.key) {
            <td class="px-4 py-3 text-on-surface">
              {{ cellValue(row, col) }}
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
