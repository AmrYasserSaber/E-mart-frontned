<div class="overflow-x-auto rounded-xl border border-slate-800">
  <table class="w-full min-w-[640px] text-left text-sm text-slate-300">
    <thead class="border-b border-slate-800 bg-slate-900/80 text-xs uppercase tracking-wide text-slate-500">
      <tr>
        @for (col of columns(); track col.key) {
          <th class="px-4 py-3 font-medium">
            @if (col.sortable) {
              <button
                type="button"
                class="inline-flex items-center gap-1 hover:text-emerald-400"
                (click)="onHeaderClick(col)"
              >
                {{ col.label }}
                @if (sortKey() === col.key) {
                  <span>{{ sortDir() === 'asc' ? '↑' : '↓' }}</span>
                }
              </button>
            } @else {
              {{ col.label }}
            }
          </th>
        }
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-800">
      @for (row of rows(); track $index) {
        <tr
          appRowPress
          (rowPress)="onRow(row)"
          class="cursor-pointer hover:bg-slate-900/60"
        >
          @for (col of columns(); track col.key) {
            <td class="px-4 py-3 text-slate-200">
              {{ cellValue(row, col) }}
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
